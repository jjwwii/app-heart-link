name: app_heart_link
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: 1.0.8

  # 라우팅
  go_router: 14.8.1

  # 상태관리
  flutter_riverpod: ^2.6.1

  # svg 이미지
  flutter_svg: 2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # riverpod_lint는 custom_lint를 기반으로 구현 됨.
  custom_lint:
  # riverpod 작업 간소화
  riverpod_lint: 2.6.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: SpoqaHanSansNeo
      fonts:
        - asset: assets/font/SpoqaHanSansNeo-Light.otf
          weight: 300
        - asset: assets/font/SpoqaHanSansNeo-Regular.otf
          weight: 400
        - asset: assets/font/SpoqaHanSansNeo-Medium.otf
          weight: 500
        - asset: assets/font/SpoqaHanSansNeo-Bold.otf
          weight: 700
